name: Mantener servidor despierto

# Este workflow existe SOLO para desarrollo activo: hace ping al servidor
# de Render cada 10 minutos para evitar que se duerma por inactividad
# (el plan gratuito de Render duerme tras ~15 min sin tráfico, y despertar
# puede tardar 50s+). Esto elimina esa espera mientras se está probando
# el juego activamente.
#
# Cuando el proyecto pase a producción real, considera:
# - Subir a un plan pago de Render (no se duerme), o
# - Desactivar/eliminar este workflow para no gastar minutos de Actions
#   innecesariamente si el desarrollo activo ya terminó.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}  # permite dispararlo manualmente desde GitHub también

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping al servidor
        run: |
          curl -s -o /dev/null -w "Status: %{http_code}\n" https://mythica-adventure.onrender.com/ || true
